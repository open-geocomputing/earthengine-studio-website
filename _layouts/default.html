<!doctype html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#07111f">
    <meta name="color-scheme" content="dark">
    {% seo %}
    <meta property="og:image" content="{{ '/assets/images/social-card.png' | absolute_url }}">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="{{ '/assets/images/social-card.png' | absolute_url }}">
    {% for language in site.data.languages %}
    <link rel="alternate" hreflang="{{ language.hreflang }}" href="{{ language.path | absolute_url }}">
    {% endfor %}
    <link rel="alternate" hreflang="x-default" href="{{ '/' | absolute_url }}">
    <link rel="icon" href="{{ '/assets/images/favicon.svg' | relative_url }}" type="image/svg+xml">
    <link rel="icon" href="{{ '/assets/images/favicon-32x32.png' | relative_url }}" type="image/png" sizes="32x32">
    <link rel="apple-touch-icon" href="{{ '/assets/images/apple-touch-icon.png' | relative_url }}" sizes="180x180">
    <link rel="preload" href="{{ '/assets/css/main.css' | relative_url }}" as="style">
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
    <script src="{{ '/assets/js/vendor/lottie.min.js' | relative_url }}" defer></script>
    <script src="{{ '/assets/js/main.js' | relative_url }}" defer></script>
  </head>
  <body>
    <a class="skip-link" href="#main">{{ page.skip_text | default: 'Skip to content' }}</a>
    {{ content }}
  </body>
</html>
