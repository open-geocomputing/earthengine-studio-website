capabilities:
  kicker: 01 / A better workspace
  title_one: Earth Engine,
  title_two: with more room to work.
  intro: We build on the planetary-scale analysis of Google Earth Engine and extend the workspace around it—more languages, scientific Python, more map choices, richer repository flows, and tools that stay close to your code.
  code_title: Scientific Python in your browser
  code_body: Move between JavaScript and browser-side Python, then work with NumPy, Matplotlib, Plotly, completion, hover help, references, and familiar editor ergonomics.
  map_title: Map without lock-in
  map_body: Choose your renderer per map, draw and inspect geometry, compare views in tabs, and keep the same script-facing map API.
  git_title: Work directly in your repositories
  git_body: Open, edit, and save files in GitHub and GitLab repositories from the Studio, with conflict-aware saves that protect remote changes.
  output_title: From output to artifact
  output_body: Inspect structured console results, open Plotly or Matplotlib figures, manage cloud exports, or stream resumable local downloads.
  figure: Figure
workflow:
  kicker: 02 / One continuous flow
  title_one: Keep the context.
  title_two: Lose the friction.
  intro: Search data, write code, inspect the map, study a figure, manage an export, and return tomorrow to the workspace you left behind.
  start: Start exploring
  discover_title: Discover
  discover_body: Search official and community catalogs without leaving the workspace.
  discover_meta: 5,473 datasets
  compose_title: Compose
  compose_body: Build in JavaScript or Python, locally or directly from a GitHub or GitLab repository.
  compose_meta: Code connected
  observe_title: Observe
  observe_body: Turn computations into explorable maps, charts, figures, and console values.
  observe_meta: Live outputs
  deliver_title: Deliver
  deliver_body: Export to the cloud or download robust, resumable local artifacts.
  deliver_meta: Cloud + local
foundation:
  base: Foundation
  layer: Workspace layer
  kicker: 03 / Built on a strong foundation
  title_one: Extend the workflow.
  title_two: Keep the engine.
  body: Earth Engine Studio is an independent, open workspace built on top of Google Earth Engine. It keeps the platform’s analysis capabilities at the center while expanding how you write, navigate, visualize, and organize the work around them.
  flexible_title: More flexible
  flexible_body: Choose languages, maps, layouts, and local workflows.
  connected_title: More connected
  connected_body: Bring repositories, code, assets, tasks, and documentation together.
  yours_title: More yours
  yours_body: Persist your working context in the browser and shape the studio around the project.
