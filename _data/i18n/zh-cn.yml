capabilities:
  kicker: 01 / 更出色的工作区
  title_one: Earth Engine，
  title_two: 更充裕的创作空间。
  intro: 我们以 Google Earth Engine 的全球尺度分析能力为基础，扩展其周边工作区——支持更多语言、科学 Python、更多地图选择、更丰富的代码仓库流程，以及始终贴近代码的工具。
  code_title: 浏览器中的科学 Python
  code_body: 在 JavaScript 与浏览器端 Python 之间自由切换，并使用 NumPy、Matplotlib、Plotly、代码补全、悬停帮助、引用查找和熟悉的编辑体验。
  map_title: 不受限制的地图体验
  map_body: 为每张地图选择渲染器，绘制和检查几何图形，在标签页中比较视图，同时保持一致的脚本地图 API。
  git_title: 直接操作您的代码仓库
  git_body: 在 Studio 中打开、编辑并保存 GitHub 和 GitLab 仓库文件，使用冲突感知保存机制保护远程更改。
  output_title: 从结果到成果
  output_body: 检查结构化控制台结果，打开 Plotly 或 Matplotlib 图表，管理云端导出，或进行可恢复的本地下载。
  figure: 图表
