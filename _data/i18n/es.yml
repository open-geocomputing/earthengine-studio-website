capabilities:
  kicker: 01 / Un espacio de trabajo mejor
  title_one: Earth Engine,
  title_two: con más espacio para trabajar.
  intro: >-
    Partimos del análisis a escala planetaria de Google Earth Engine y ampliamos el espacio de trabajo que lo rodea: más lenguajes, Python científico, más opciones cartográficas, mejores flujos de repositorios y herramientas cerca de su código.
  code_title: Python científico en su navegador
  code_body: Alterne entre JavaScript y Python en el navegador y utilice NumPy, Matplotlib, Plotly, autocompletado, ayuda contextual, referencias y una experiencia de edición familiar.
  map_title: Mapas sin dependencia
  map_body: Elija el motor para cada mapa, dibuje e inspeccione geometrías, compare vistas en pestañas y mantenga la misma API cartográfica en sus scripts.
  map_capture_alt: Earth Engine Studio mostrando JavaScript, resultados de consola y un mapa tridimensional del terreno de Innsbruck
  git_title: Trabaje directamente en sus repositorios
  git_body: Abra, edite y guarde archivos de repositorios de GitHub y GitLab desde Studio, con guardados conscientes de conflictos que protegen los cambios remotos.
  output_title: Del resultado al artefacto
  output_body: Inspeccione resultados estructurados de la consola, abra figuras de Plotly o Matplotlib, gestione exportaciones en la nube o descargue archivos locales reanudables.
  output_capture_alt: Earth Engine Studio mostrando una serie temporal interactiva de Plotly con controles de exportación
  figure: Figura
workflow:
  kicker: 02 / Un flujo continuo
  title_one: Mantenga el contexto.
  title_two: Elimine la fricción.
  intro: Busque datos, escriba código, inspeccione el mapa, estudie una figura, gestione una exportación y vuelva mañana al mismo espacio de trabajo.
  start: Empezar a explorar
  discover_title: Descubrir
  discover_body: Busque en catálogos oficiales y comunitarios sin salir del espacio de trabajo.
  discover_meta: 5473 conjuntos de datos
  compose_title: Crear
  compose_body: Desarrolle en JavaScript o Python, localmente o directamente desde un repositorio de GitHub o GitLab.
  compose_meta: Código conectado
  observe_title: Observar
  observe_body: Convierta cálculos en mapas, gráficos, figuras y valores de consola explorables.
  observe_meta: Resultados en vivo
  deliver_title: Entregar
  deliver_body: Exporte a la nube o descargue artefactos locales robustos y reanudables.
  deliver_meta: Nube + local
foundation:
  base: Base
  layer: Capa de trabajo
  kicker: 03 / Construido sobre una base sólida
  title_one: Amplíe el flujo de trabajo.
  title_two: Mantenga el motor.
  body: Earth Engine Studio es un espacio de trabajo independiente y abierto construido sobre Google Earth Engine. Mantiene las capacidades de análisis de la plataforma en el centro y amplía la forma de escribir, navegar, visualizar y organizar el trabajo.
  flexible_title: Más flexible
  flexible_body: Elija lenguajes, mapas, diseños y flujos de trabajo locales.
  connected_title: Más conectado
  connected_body: Reúna repositorios, código, recursos, tareas y documentación.
  yours_title: Más suyo
  yours_body: Conserve su contexto de trabajo en el navegador y adapte Studio al proyecto.
