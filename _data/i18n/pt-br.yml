capabilities:
  kicker: 01 / Um espaço de trabalho melhor
  title_one: Earth Engine,
  title_two: com mais espaço para trabalhar.
  intro: Aproveitamos a análise em escala planetária do Google Earth Engine e ampliamos o espaço de trabalho ao redor dela — mais linguagens, Python científico, mais opções de mapa, fluxos de repositório mais ricos e ferramentas próximas do seu código.
  code_title: Python científico no seu navegador
  code_body: Alterne entre JavaScript e Python no navegador e use NumPy, Matplotlib, Plotly, preenchimento automático, ajuda contextual, referências e uma experiência de edição familiar.
  map_title: Mapas sem dependência
  map_body: Escolha o renderizador de cada mapa, desenhe e inspecione geometrias, compare visualizações em abas e mantenha a mesma API de mapas nos scripts.
  git_title: Trabalhe diretamente nos seus repositórios
  git_body: Abra, edite e salve arquivos de repositórios GitHub e GitLab pelo Studio, com salvamentos atentos a conflitos que protegem alterações remotas.
  output_title: Do resultado ao artefato
  output_body: Inspecione resultados estruturados do console, abra figuras Plotly ou Matplotlib, gerencie exportações para a nuvem ou faça downloads locais retomáveis.
  figure: Figura
workflow:
  kicker: 02 / Um fluxo contínuo
  title_one: Mantenha o contexto.
  title_two: Elimine o atrito.
  intro: Pesquise dados, escreva código, inspecione o mapa, estude uma figura, gerencie uma exportação e volte amanhã ao mesmo espaço de trabalho.
  start: Começar a explorar
  discover_title: Descobrir
  discover_body: Pesquise catálogos oficiais e da comunidade sem sair do espaço de trabalho.
  discover_meta: 5.473 conjuntos de dados
  compose_title: Criar
  compose_body: Desenvolva em JavaScript ou Python, localmente ou diretamente de um repositório GitHub ou GitLab.
  compose_meta: Código conectado
  observe_title: Observar
  observe_body: Transforme cálculos em mapas, gráficos, figuras e valores de console exploráveis.
  observe_meta: Resultados ao vivo
  deliver_title: Entregar
  deliver_body: Exporte para a nuvem ou baixe artefatos locais robustos e retomáveis.
  deliver_meta: Nuvem + local
foundation:
  base: Base
  layer: Camada de trabalho
  kicker: 03 / Construído sobre uma base sólida
  title_one: Amplie o fluxo de trabalho.
  title_two: Mantenha o motor.
  body: O Earth Engine Studio é um espaço de trabalho independente e aberto construído sobre o Google Earth Engine. Ele mantém os recursos de análise da plataforma no centro e amplia a forma de escrever, navegar, visualizar e organizar o trabalho.
  flexible_title: Mais flexível
  flexible_body: Escolha linguagens, mapas, layouts e fluxos de trabalho locais.
  connected_title: Mais conectado
  connected_body: Reúna repositórios, código, recursos, tarefas e documentação.
  yours_title: Mais seu
  yours_body: Preserve seu contexto de trabalho no navegador e adapte o Studio ao projeto.
